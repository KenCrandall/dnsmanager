services:
  dnsmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dnsmanager
    environment:
      DNSMANAGER_HTTP_ADDR: :8080
      DNSMANAGER_DATA_DIR: /var/lib/dnsmanager/data
      DNSMANAGER_CONFIG_DIR: /var/lib/dnsmanager/config
      DNSMANAGER_CONTENT_DIR: /var/lib/dnsmanager/content
      DNSMANAGER_UI_DIST_DIR: /app/web/dist
      DNSMANAGER_DB_PATH: /var/lib/dnsmanager/data/dnsmanager.db
    ports:
      - "8080:8080"
    volumes:
      - dnsmanager-data:/var/lib/dnsmanager/data
      - dnsmanager-config:/var/lib/dnsmanager/config
      - dnsmanager-content:/var/lib/dnsmanager/content
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  dnsmasq:
    build:
      context: .
      dockerfile: docker/dnsmasq/Dockerfile
    container_name: dnsmanager-dnsmasq
    depends_on:
      dnsmanager:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    ports:
      - "1053:53/tcp"
      - "1053:53/udp"
      - "1067:67/udp"
      - "1069:69/udp"
    volumes:
      - dnsmanager-config:/etc/dnsmanager:ro
      - dnsmanager-content:/srv/tftp:ro

volumes:
  dnsmanager-data:
  dnsmanager-config:
  dnsmanager-content:

