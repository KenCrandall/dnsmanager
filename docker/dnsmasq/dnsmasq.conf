no-daemon
log-facility=-
bind-dynamic

# The foundation scaffold keeps dnsmasq pointed at the shared config tree
# that dnsmanager will populate over time.
conf-dir=/etc/dnsmanager/manual,*.conf
conf-dir=/etc/dnsmanager/managed,*.conf
conf-dir=/etc/dnsmanager/generated,*.conf

enable-tftp
tftp-root=/srv/tftp

